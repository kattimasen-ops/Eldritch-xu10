name: Build Eldritch R36S Performance

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-r36s:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake make git libgles2-mesa-dev

    - name: Build Dependencies (ARM64)
      run: |
        sudo mkdir -p /opt/r36s-deps && sudo chmod 777 /opt/r36s-deps
        export CMAKE_ARGS="-DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=/usr/bin/aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=/usr/bin/aarch64-linux-gnu-g++ -DCMAKE_INSTALL_PREFIX=/opt/r36s-deps"
        
        # Abhängigkeiten (ZLIB, SDL2, OpenAL, GLESv2) hier unverändert belassen
        # ... (dein bewährter Abhängigkeiten-Block) ...

    - name: Configure and Build
      run: |
        cd $GITHUB_WORKSPACE/Code
        rm -rf build_game && mkdir build_game && cd build_game
        
        # PERF_FLAGS: Die Essenz der Vita/Meldritch Optimierungen für ARM
        # -Ofast: Aggressivste Optimierung
        # -flto: Link-Time Optimization für besseres Binary-Layout
        # -mcpu=cortex-a35: Spezifische Architektur-Optimierung für R36S
        export PERF_FLAGS="-Ofast -flto -mcpu=cortex-a35 -mtune=cortex-a35 -funroll-loops"
        
        cmake .. \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
          -DCMAKE_C_COMPILER=/usr/bin/aarch64-linux-gnu-gcc \
          -DCMAKE_CXX_COMPILER=/usr/bin/aarch64-linux-gnu-g++ \
          -DCMAKE_PREFIX_PATH="/opt/r36s-deps" \
          -DSDL2_DIR="/opt/r36s-deps/lib/cmake/SDL2" \
          -DWITH_SDL2=ON \
          -DWITH_SDL2_STATIC=ON \
          -DARM64=ON -DGLES=ON -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_FLAGS="-I/opt/r36s-deps/include $PERF_FLAGS -fpermissive -DNDEBUG -DMAX_PARTICLES=1000" \
          -DCMAKE_C_FLAGS="-I/opt/r36s-deps/include $PERF_FLAGS" \
          -DCMAKE_EXE_LINKER_FLAGS="-L/opt/r36s-deps/lib -Wl,--allow-shlib-undefined -flto"
          
        make -j$(nproc)

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Eldritch-R36S-Optimized
        path: |
          Code/build_game/Projects/Eld/Eld
          Code/build_game/Eldritch
