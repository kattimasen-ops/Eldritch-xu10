name: Build Eldritch 2019 Hybrid R36S

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-r36s:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Base Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake make git libgles2-mesa-dev libegl1-mesa-dev

    - name: Build and Install Dependencies (SDL2, OpenAL, Ogg, Vorbis)
      run: |
        mkdir -p /opt/r36s-deps
        # Build SDL2
        git clone --depth 1 --branch release-2.28.x https://github.com/libsdl-org/SDL.git /tmp/SDL
        mkdir /tmp/SDL/build && cd /tmp/SDL/build
        cmake .. -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ -DCMAKE_INSTALL_PREFIX=/opt/r36s-deps -DSDL_VIDEO_DRIVER_X11=ON -DSDL_VIDEO_DRIVER_GLES2=ON
        make -j$(nproc) && sudo make install

        # Build OpenAL-Soft
        git clone --depth 1 --branch 1.22.2 https://github.com/kcat/openal-soft.git /tmp/openal-soft
        mkdir /tmp/openal-soft/build && cd /tmp/openal-soft/build
        cmake .. -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ -DCMAKE_INSTALL_PREFIX=/opt/r36s-deps -DALSOFT_EXAMPLES=OFF -DALSOFT_UTILS=OFF
        make -j$(nproc) && sudo make install

        # Build Ogg & Vorbis
        git clone --depth 1 https://github.com/xiph/ogg.git /tmp/ogg
        mkdir /tmp/ogg/build && cd /tmp/ogg/build
        cmake .. -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_INSTALL_PREFIX=/opt/r36s-deps
        make -j$(nproc) && sudo make install

        git clone --depth 1 https://github.com/xiph/vorbis.git /tmp/vorbis
        mkdir /tmp/vorbis/build && cd /tmp/vorbis/build
        cmake .. -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_INSTALL_PREFIX=/opt/r36s-deps -DOGG_ROOT=/opt/r36s-deps
        make -j$(nproc) && sudo make install

    - name: Apply mEldritch & Performance Patches
      run: |
        cd $GITHUB_WORKSPACE/Code
        # Fix SoLoud
        SOLOUD_CPP=$(find . -name "soloud.cpp" | head -n 1)
        [ -f "$SOLOUD_CPP" ] && sed -i '1s/^/#define WITH_SDL2 1\n#define WITH_SDL2_STATIC 1\n/' "$SOLOUD_CPP"
        # Asset Overrider
        PACKSTREAM_CPP=$(find . -name "packstream.cpp" | head -n 1)
        [ -f "$PACKSTREAM_CPP" ] && sed -i 's/m_PackedFile( false )/m_PackedFile( false ) \/\/ Patched/g' "$PACKSTREAM_CPP"
        # Quicksave
        GAME_FILE=$(find . -name "eldritchgame.cpp" | head -n 1)
        [ -f "$GAME_FILE" ] && sed -i 's/void EldritchGame::Tick()/void EldritchGame::Tick() {\n\tif( m_Framework->GetKeyboard()->OnRise( SDL_SCANCODE_F5 ) ) { SaveGame(); }\n\tif( m_Framework->GetKeyboard()->OnRise( SDL_SCANCODE_F9 ) ) { LoadGame(); }/g' "$GAME_FILE"
        # Performance
        PARTICLE_FILE=$(find . -name "particles.h" | head -n 1)
        [ -f "$PARTICLE_FILE" ] && sed -i 's/sc_MaxParticles *= *1000/sc_MaxParticles = 200/g' "$PARTICLE_FILE"
        SOUND_FILE=$(find . -name "soundmanager.cpp" | head -n 1)
        [ -f "$SOUND_FILE" ] && sed -i 's/m_SoundSystem->Tick();/m_SoundSystem->Tick();\n\t\tSDL_Delay(1);/g' "$SOUND_FILE"

    - name: Configure and Build
      env:
        PKG_CONFIG_PATH: /opt/r36s-deps/lib/pkgconfig
        # Hier sind die gelockerten Compiler-Flags:
        CFLAGS: "-march=armv8-a+crc -mcpu=cortex-a35 -O3 -pipe -I/opt/r36s-deps/include -fpermissive -Wno-multichar"
        CXXFLAGS: "-march=armv8-a+crc -mcpu=cortex-a35 -O3 -pipe -I/opt/r36s-deps/include -fpermissive -Wno-multichar"
        LDFLAGS: "-L/opt/r36s-deps/lib"
      run: |
        cd $GITHUB_WORKSPACE/Code
        rm -rf build_game && mkdir -p build_game && cd build_game
        cmake .. \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
          -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
          -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
          -DCMAKE_FIND_ROOT_PATH=/opt/r36s-deps \
          -DARM64=ON -DGLES=ON -DUSE_GLES2=ON -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc) || make

    - name: Prepare and Upload Artifacts
      run: |
        mkdir -p /tmp/artifact/bin
        cp $GITHUB_WORKSPACE/Code/build_game/Eldritch /tmp/artifact/bin/ 2>/dev/null || cp $GITHUB_WORKSPACE/Code/build_game/eldritch /tmp/artifact/bin/ 2>/dev/null || true
        cp /opt/r36s-deps/lib/*.so* /tmp/artifact/bin/ 2>/dev/null || true
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Eldritch-R36S-ARM64
        path: /tmp/artifact/bin/
