name: Build Eldritch R36S Final

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-r36s:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Toolchain
      run: |
        sudo apt-get update
        # Wir brauchen zlib1g-dev für den HOST (x86_64), damit Checksum linken kann
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake make git zlib1g-dev libgles2-mesa-dev

    - name: Configure and Build
      run: |
        cd $GITHUB_WORKSPACE/Code
        find . -name "build_game" -type d -exec rm -rf {} +
        mkdir build_game && cd build_game
        
        # 1. Wir setzen CMAKE_C_COMPILER auf den Host-Compiler (Standard)
        # 2. Wir nutzen -DCMAKE_PROJECT_Eld_INCLUDE, um ARM-Flags NUR auf das Spiel anzuwenden
        
        cmake .. \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
          -DCMAKE_C_COMPILER=/usr/bin/gcc \
          -DCMAKE_CXX_COMPILER=/usr/bin/g++ \
          -DCROSS_COMPILE_C=/usr/bin/aarch64-linux-gnu-gcc \
          -DCROSS_COMPILE_CXX=/usr/bin/aarch64-linux-gnu-g++ \
          -DARM64=ON -DGLES=ON -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_FLAGS="-O3 -fpermissive -Wno-error=nonnull" \
          -DCMAKE_C_FLAGS="-O3"

        # Da Eldritch ein altes, monolithisches CMake-Projekt ist, 
        # überschreiben wir die Compiler-Variablen direkt im Make-Aufruf
        make CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++ -j$(nproc)
