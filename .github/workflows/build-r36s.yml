name: Build Eldritch 2019 Hybrid R36S

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-r36s:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake make git libgles2-mesa-dev libz-dev

    - name: Build External Dependencies
      run: |
        mkdir -p /opt/r36s-deps
        # Build SDL2
        git clone --depth 1 --branch release-2.28.x https://github.com/libsdl-org/SDL.git /tmp/SDL
        mkdir /tmp/SDL/build && cd /tmp/SDL/build
        cmake .. -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ -DCMAKE_INSTALL_PREFIX=/opt/r36s-deps
        make -j$(nproc) && sudo make install

        # Build OpenAL-Soft
        git clone --depth 1 --branch 1.22.2 https://github.com/kcat/openal-soft.git /tmp/openal-soft
        mkdir /tmp/openal-soft/build && cd /tmp/openal-soft/build
        cmake .. -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ -DCMAKE_INSTALL_PREFIX=/opt/r36s-deps -DALSOFT_EXAMPLES=OFF -DALSOFT_UTILS=OFF
        make -j$(nproc) && sudo make install

    - name: Patch Code
      run: |
        cd $GITHUB_WORKSPACE/Code
        # Patching (Sicherheits-Check inklusive)
        find . -name "soloud.cpp" -exec sed -i '1s/^/#define WITH_SDL2 1\n#define WITH_SDL2_STATIC 1\n/' {} +
        find . -name "packstream.cpp" -exec sed -i 's/m_PackedFile( false )/m_PackedFile( false ) \/\/ Patched/g' {} +
        find . -name "particles.h" -exec sed -i 's/sc_MaxParticles *= *1000/sc_MaxParticles = 200/g' {} +

    - name: Configure and Build
      env:
        # Hier erzwingen wir die Suche in unserem Deps-Ordner
        CMAKE_LIBRARY_PATH: /opt/r36s-deps/lib
        CMAKE_INCLUDE_PATH: /opt/r36s-deps/include
        CFLAGS: "-march=armv8-a+crc -mcpu=cortex-a35 -O3 -fpermissive -Wno-multichar"
        CXXFLAGS: "-march=armv8-a+crc -mcpu=cortex-a35 -O3 -fpermissive -Wno-multichar"
      run: |
        cd $GITHUB_WORKSPACE/Code
        rm -rf build_game && mkdir -p build_game && cd build_game
        # Erzwinge absolute Pfade für Libs, falls CMake sie nicht findet
        cmake .. \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
          -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
          -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
          -DOPENAL_LIBRARY=/opt/r36s-deps/lib/libopenal.so \
          -DZLIB_LIBRARY=/usr/lib/aarch64-linux-gnu/libz.so \
          -DOPENGL_gles2_LIBRARY=/opt/r36s-deps/lib/libGLESv2.so \
          -DARM64=ON -DGLES=ON -DUSE_GLES2=ON -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Eldritch-R36S-Binary
        path: $GITHUB_WORKSPACE/Code/build_game/Eldritch
